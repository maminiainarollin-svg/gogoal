<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goal Master Ultra - Mada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .card { background: #161c2d; border: 1px solid #2d3748; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-active { background: #22d3ee !important; color: #0b0f1a !important; font-weight: bold; transform: scale(1.02); }
        .history-item { border-left: 4px solid; transition: all 0.2s; }
        @keyframes pulse-cyan { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse-cyan 2s infinite; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-10">

    <header class="w-full max-w-md mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-cyan-400 tracking-tighter italic uppercase">Goal Master <span class="text-white">Ultra</span></h1>
            <div class="flex items-center text-[9px] text-slate-500 font-bold tracking-widest uppercase">
                <span class="status-dot bg-cyan-400"></span> Live Stats Engine
            </div>
        </div>
        <button onclick="resetAll()" class="text-slate-500 hover:text-red-400 p-2 transition">
            <i class="fas fa-redo-alt"></i>
        </button>
    </header>

    <main class="w-full max-w-md space-y-4">
        
        <div class="card p-4 rounded-2xl">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTerrain(3, 1, this)" class="terrain-btn py-3 rounded-xl bg-slate-800 text-[10px] font-bold border border-transparent">PETIT (3x4)</button>
                <button onclick="setTerrain(4, 1, this)" class="terrain-btn py-3 rounded-xl bg-slate-800 text-[10px] font-bold border border-transparent btn-active">MOYEN (4x7)</button>
                <button onclick="setTerrain(5, 1, this)" class="terrain-btn py-3 rounded-xl bg-slate-800 text-[10px] font-bold border border-transparent">GRAND (5x10)</button>
            </div>
        </div>

        <div class="card p-4 rounded-2xl flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-500 uppercase italic">Paliers visés</span>
                <div class="flex items-center gap-3">
                    <span id="paliersVal" class="text-3xl font-black text-white">3</span>
                    <span id="multiplier" class="text-[10px] bg-cyan-900/40 text-cyan-400 px-2 py-0.5 rounded-full font-bold">x2.31</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="changePalier(-1)" class="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center active:bg-slate-600 transition"><i class="fas fa-minus"></i></button>
                <button onclick="changePalier(1)" class="w-10 h-10 bg-cyan-600 rounded-xl flex items-center justify-center active:bg-cyan-500 transition"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <div class="card p-4 rounded-2xl bg-gradient-to-br from-[#1e293b] to-[#0f172a] border-cyan-500/30">
            <button onclick="genererChemin()" class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 rounded-xl font-black text-slate-900 uppercase shadow-lg shadow-cyan-500/20 active:scale-95 transition flex items-center justify-center gap-2">
                <i class="fas fa-crosshairs"></i> Suggestion Trajet
            </button>
            <div id="cheminVisuel" class="mt-4 flex flex-wrap justify-center gap-2 min-h-[44px]">
                </div>
        </div>

        <div class="card p-4 rounded-2xl">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase italic block mb-1">Mon Solde (Ar)</label>
                    <input type="number" id="solde" value="11000" oninput="calculer()" class="w-full bg-slate-900 p-2 rounded-lg border border-slate-700 outline-none font-mono text-cyan-400">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase italic block mb-1">Gain Estimé (Ar)</label>
                    <div id="gainEstime" class="w-full bg-slate-800/50 p-2 rounded-lg border border-slate-700 font-mono text-green-400 font-bold">924</div>
                </div>
            </div>
        </div>

        <div id="resultCard" class="p-5 rounded-3xl text-center border-2 transition-all duration-300">
            <div class="text-[10px] uppercase tracking-widest text-white/50 mb-1 font-bold">Indice de Confiance</div>
            <div id="percentage" class="text-5xl font-black mb-1">42.2%</div>
            <div class="text-[11px] text-white/70 italic" id="statusMsg">Prudence recommandée</div>
            <div class="h-[1px] w-1/2 bg-white/10 mx-auto my-3"></div>
            <div class="flex justify-between items-center px-4">
                <span class="text-[10px] text-slate-400 uppercase font-bold">Mise suggérée :</span>
                <span id="miseSuggeree" class="text-xl font-black text-white">400 Ar</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="addHistory(true)" class="bg-green-600 p-3 rounded-xl font-black uppercase text-[10px] flex items-center justify-center gap-2 active:scale-95 transition">
                <i class="fas fa-check-circle text-lg"></i> Gain
            </button>
            <button onclick="addHistory(false)" class="bg-red-600 p-3 rounded-xl font-black uppercase text-[10px] flex items-center justify-center gap-2 active:scale-95 transition">
                <i class="fas fa-times-circle text-lg"></i> Perte
            </button>
        </div>

        <div class="card p-4 rounded-2xl">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase italic">Session Stats</h3>
                <span id="sessionWinRate" class="text-[9px] font-bold text-cyan-400">WR: 0%</span>
            </div>
            <div id="historyList" class="space-y-2 max-h-32 overflow-y-auto pr-1 font-mono text-[11px]">
                <p class="text-slate-600 text-center py-2 italic">Aucune donnée</p>
            </div>
        </div>

    </main>

    <script>
        let currentN = 4;
        let currentM = 1;
        let currentP = 3;
        let stats = { wins: 0, losses: 0 };

        function setTerrain(n, m, btn) {
            currentN = n; currentM = m;
            document.querySelectorAll('.terrain-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            calculer();
        }

        function changePalier(val) {
            currentP = Math.max(1, Math.min(10, currentP + val));
            document.getElementById('paliersVal').innerText = currentP;
            calculer();
        }

        function genererChemin() {
            const container = document.getElementById('cheminVisuel');
            container.innerHTML = "";
            for (let i = 0; i < currentP; i++) {
                const caseNum = Math.floor(Math.random() * currentN) + 1;
                const badge = document.createElement('div');
                badge.className = "w-9 h-9 bg-cyan-400 text-slate-900 rounded-lg flex items-center justify-center font-black shadow-lg scale-0 transition-transform duration-300";
                badge.innerText = caseNum;
                container.appendChild(badge);
                setTimeout(() => badge.style.transform = "scale(1)", i * 50);
            }
        }

        function calculer() {
            const probaUnitaire = (currentN - currentM) / currentN;
            const probaTotale = Math.pow(probaUnitaire, currentP);
            const multiplier = Math.pow(1.35, currentP); // Simulation approximative de cote
            
            document.getElementById('percentage').innerText = (probaTotale * 100).toFixed(1) + "%";
            document.getElementById('multiplier').innerText = "x" + multiplier.toFixed(2);
            
            const solde = parseFloat(document.getElementById('solde').value) || 0;
            let miseBase = probaTotale > 0.7 ? solde * 0.12 : (probaTotale > 0.4 ? solde * 0.06 : solde * 0.03);
            let miseFinale = Math.max(400, Math.floor(miseBase));
            if (solde < 400) miseFinale = 0;
            
            document.getElementById('miseSuggeree').innerText = miseFinale + " Ar";
            document.getElementById('gainEstime').innerText = Math.floor(miseFinale * multiplier);

            const rCard = document.getElementById('resultCard');
            const statusMsg = document.getElementById('statusMsg');
            if (probaTotale > 0.7) {
                rCard.className = "p-5 rounded-3xl text-center border-2 border-green-500 bg-green-900/10 shadow-[0_0_20px_rgba(34,197,94,0.1)]";
                statusMsg.innerText = "Signal : Haute Confiance";
            } else if (probaTotale > 0.4) {
                rCard.className = "p-5 rounded-3xl text-center border-2 border-yellow-500 bg-yellow-900/10";
                statusMsg.innerText = "Signal : Modéré";
            } else {
                rCard.className = "p-5 rounded-3xl text-center border-2 border-red-500 bg-red-900/10";
                statusMsg.innerText = "Signal : Risque Critique";
            }
        }

        function addHistory(win) {
            if (win) stats.wins++; else stats.losses++;
            const total = stats.wins + stats.losses;
            document.getElementById('sessionWinRate').innerText = "WR: " + Math.round((stats.wins/total)*100) + "%";
            
            const list = document.getElementById('historyList');
            if (list.innerHTML.includes("Aucune donnée")) list.innerHTML = "";
            
            const item = document.createElement('div');
            item.className = `p-2 rounded bg-slate-800/40 history-item ${win ? 'border-green-500' : 'border-red-500'} flex justify-between animate-pop`;
            item.innerHTML = `<span>${win ? 'WIN' : 'LOSS'}</span><span>P${currentP}</span>`;
            list.prepend(item);
            
            if (stats.losses >= 5 && stats.losses > stats.wins) {
                alert("⚠️ Alerte Stop-Loss : Vous avez trop de pertes sur cette session. Faites une pause !");
            }
        }

        function resetAll() {
            if(confirm("Réinitialiser la session ?")) {
                stats = { wins: 0, losses: 0 };
                document.getElementById('historyList').innerHTML = '<p class="text-slate-600 text-center py-2 italic">Aucune donnée</p>';
                document.getElementById('sessionWinRate').innerText = "WR: 0%";
            }
        }

        window.onload = calculer;
    </script>
</body>
</html>
