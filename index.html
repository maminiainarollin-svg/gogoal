<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goal Master Save - Mada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Segoe UI', sans-serif; }
        .card { background: #161c2d; border: 1px solid #2d3748; }
        .btn-active { background: #22d3ee !important; color: #0b0f1a !important; font-weight: bold; }
        .history-item { border-left: 4px solid; transition: all 0.2s; }
        .progress-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #22d3ee; transition: width 0.5s; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-10">

    <header class="w-full max-w-md mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-cyan-400 italic">GOAL <span class="text-white">PRO SAVE</span></h1>
            <p class="text-[9px] text-green-500 font-bold uppercase"><i class="fas fa-database"></i> Données Sauvegardées</p>
        </div>
        <button onclick="clearData()" class="text-slate-500 hover:text-red-400 p-2"><i class="fas fa-trash-alt"></i></button>
    </header>

    <main class="w-full max-w-md space-y-4">
        
        <div class="card p-4 rounded-2xl">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] font-bold text-slate-500 uppercase italic">Progression Totale (Ar)</span>
                <span id="totalProfit" class="text-lg font-black text-green-400">+0 Ar</span>
            </div>
            <div class="progress-bar"><div id="pFill" class="progress-fill" style="width: 0%"></div></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="card p-3 rounded-xl">
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-2">Terrain</label>
                <select id="tSelect" onchange="updateT()" class="w-full bg-slate-800 p-2 rounded text-xs outline-none border-none">
                    <option value="3">Petit (3x4)</option>
                    <option value="4" selected>Moyen (4x7)</option>
                    <option value="5">Grand (5x10)</option>
                </select>
            </div>
            <div class="card p-3 rounded-xl flex flex-col justify-center text-center">
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Palier</label>
                <div class="flex items-center justify-around font-black">
                    <button onclick="changeP(-1)" class="text-cyan-400 text-lg">-</button>
                    <span id="pVal" class="text-xl">3</span>
                    <button onclick="changeP(1)" class="text-cyan-400 text-lg">+</button>
                </div>
            </div>
        </div>

        <button onclick="gen()" class="w-full py-4 bg-cyan-500 rounded-xl font-black text-slate-900 uppercase shadow-lg active:scale-95 transition">🎯 Suggestion Trajet</button>
        <div id="cViz" class="flex justify-center gap-2 min-h-[40px]"></div>

        <div class="card p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Solde Actuel (Ar)</label>
            <input type="number" id="solde" value="1000" oninput="calc()" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none text-xl font-mono text-cyan-400">
            <div class="mt-3 flex justify-between text-xs font-bold uppercase italic">
                <span class="text-slate-500 italic">Mise conseillée:</span>
                <span id="mSugg" class="text-white font-black">400 Ar</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="log(true)" class="bg-green-600 p-4 rounded-xl font-black uppercase text-xs active:scale-95 transition">Gain ✅</button>
            <button onclick="log(false)" class="bg-red-600 p-4 rounded-xl font-black uppercase text-xs active:scale-95 transition">Perte ❌</button>
        </div>

        <div class="card p-4 rounded-2xl">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-3 italic">Dernières Opérations</h3>
            <div id="hList" class="space-y-2 max-h-40 overflow-y-auto font-mono text-[10px]"></div>
        </div>

    </main>

    <script>
        let n=4, p=3, profit=0;
        let logs = JSON.parse(localStorage.getItem('goal_logs')) || [];
        profit = parseInt(localStorage.getItem('goal_profit')) || 0;

        function updateT(){ n = parseInt(document.getElementById('tSelect').value); calc(); }
        function changeP(v){ p = Math.max(1, p+v); document.getElementById('pVal').innerText = p; calc(); }

        function gen(){
            const v = document.getElementById('cViz'); v.innerHTML="";
            for(let i=0; i<p; i++){
                const b = document.createElement('div');
                b.className = "w-10 h-10 bg-white text-slate-900 rounded-lg flex items-center justify-center font-black animate-bounce";
                b.innerText = Math.floor(Math.random()*n)+1; v.appendChild(b);
            }
        }

        function calc(){
            const prob = Math.pow((n-1)/n, p);
            const solde = parseInt(document.getElementById('solde').value) || 0;
            let m = Math.max(400, Math.floor(solde * (prob > 0.6 ? 0.1 : 0.05)));
            document.getElementById('mSugg').innerText = (solde < 400 ? 0 : m) + " Ar";
            
            document.getElementById('totalProfit').innerText = (profit >= 0 ? "+" : "") + profit + " Ar";
            document.getElementById('totalProfit').className = profit >= 0 ? "text-lg font-black text-green-400" : "text-lg font-black text-red-400";
            document.getElementById('pFill').style.width = Math.min(100, Math.abs(profit/50)) + "%";
        }

        function log(win){
            const m = parseInt(document.getElementById('mSugg').innerText);
            const mult = Math.pow(1.3, p);
            const val = win ? Math.floor(m * mult) - m : -m;
            profit += val;
            
            const entry = { win, val, p, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
            logs.unshift(entry);
            if(logs.length > 20) logs.pop();
            
            save(); render(); calc();
        }

        function save(){
            localStorage.setItem('goal_logs', JSON.stringify(logs));
            localStorage.setItem('goal_profit', profit);
        }

        function render(){
            const l = document.getElementById('hList'); l.innerHTML = "";
            logs.forEach(e => {
                const d = document.createElement('div');
                d.className = `p-2 rounded bg-slate-800/50 history-item ${e.win?'border-green-500':'border-red-500'} flex justify-between items-center`;
                d.innerHTML = `<span>${e.win?'WIN':'LOSS'} (${e.val > 0 ? '+':''}${e.val} Ar)</span><span class="text-slate-500 italic">P${e.p} - ${e.time}</span>`;
                l.appendChild(d);
            });
        }

        function clearData(){
            if(confirm("Effacer tout l'historique et les gains ?")){
                localStorage.clear(); profit = 0; logs = []; render(); calc();
            }
        }

        window.onload = () => { render(); calc(); };
    </script>
</body>
</html>
