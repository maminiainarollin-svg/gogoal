<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Goal Analyzer - Anti-Mines</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --border: #2a2a3a;
      --accent: #00e5a0; --accent2: #ff4d6d; --text: #e8e8f0; --card: #13131e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; padding: 15px; }
    .container { max-width: 600px; margin: 0 auto; }
    .grid-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 20px; }
    #game-grid { display: grid; gap: 8px; }
    .cell { 
      aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border); 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      background: var(--bg2); cursor: pointer; position: relative;
    }
    .cell.ball { border-color: var(--accent); background: rgba(0,229,160,0.1); }
    .cell.mine { border-color: var(--accent2); background: rgba(255,77,109,0.1); }
    .stat-label { font-size: 8px; font-weight: bold; position: absolute; bottom: 2px; }
    .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .btn-save { background: var(--accent); color: #000; }
    .btn-analyze { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>

<div class="container">
  <h1 style="font-family: 'Syne'; text-align: center; margin-bottom: 20px;">GO GOAL <span>ANALYZER</span></h1>

  <div class="grid-wrapper">
    <div id="game-grid"></div>
  </div>

  <button class="btn btn-save" onclick="saveGame()">ENREGISTRER LA PARTIE</button>
  <button class="btn btn-analyze" onclick="analyze()">VOIR LES PROBABILITÉS</button>
  <button class="btn btn-analyze" onclick="resetGrid()" style="opacity: 0.6;">EFFACER LA GRILLE</button>
</div>

<script>
let rows = 4, cols = 7;
let cellStates = new Array(rows * cols).fill(0); // 0: vide, 1: ballon, 2: mine
let history = JSON.parse(localStorage.getItem('gogoal_v3_history') || '[]');

function buildGrid() {
  const grid = document.getElementById('game-grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';

  const stats = calculateStats();

  for (let i = 0; i < rows * cols; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    if(cellStates[i] === 1) cell.classList.add('ball');
    if(cellStates[i] === 2) cell.classList.add('mine');
    
    cell.textContent = cellStates[i] === 1 ? '⚽' : cellStates[i] === 2 ? '💣' : '';
    
    // Affichage du score de confiance (Ballons vs Mines)
    if (stats[i]) {
      const score = Math.round(stats[i] * 100);
      cell.innerHTML += `<span class="stat-label" style="color:${score > 50 ? 'var(--accent)' : 'var(--accent2)'}">${score}%</span>`;
      cell.style.backgroundColor = `rgba(${score > 50 ? '0,229,160' : '255,77,109'}, ${Math.abs(score-50)/150})`;
    }

    cell.onclick = () => {
      cellStates[i] = (cellStates[i] + 1) % 3;
      buildGrid();
    };
    grid.appendChild(cell);
  }
}

function calculateStats() {
  const stats = new Array(rows * cols).fill(0.5); // 50% par défaut
  const counts = new Array(rows * cols).fill({b:0, m:0});

  history.forEach(game => {
    game.data.forEach((val, i) => {
      if(val === 1) counts[i] = { ...counts[i], b: counts[i].b + 1 };
      if(val === 2) counts[i] = { ...counts[i], m: counts[i].m + 1 };
    });
  });

  return counts.map(c => {
    const total = c.b + c.m;
    return total === 0 ? 0.5 : (c.b / total);
  });
}

function saveGame() {
  history.unshift({ data: [...cellStates], date: Date.now() });
  localStorage.setItem('gogoal_v3_history', JSON.stringify(history));
  cellStates.fill(0);
  buildGrid();
  alert("Partie enregistrée !");
}

function resetGrid() {
  cellStates.fill(0);
  buildGrid();
}

function analyze() {
  const stats = calculateStats();
  let msg = "CONSEILS PAR COLONNE :\n";
  for(let c=0; c<cols; c++) {
    let bestR = 0, max = -1;
    for(let r=0; r<rows; r++) {
      let idx = r * cols + c;
      if(stats[idx] > max) { max = stats[idx]; bestR = r+1; }
    }
    msg += `Col ${c+1} : Ligne ${bestR} (${Math.round(max*100)}% de confiance)\n`;
  }
  alert(msg);
}

buildGrid();
</script>
</body>
</html>
