<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Master Pro - Mada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Segoe UI', sans-serif; }
        .card { background: #161c2d; border: 1px solid #2d3748; }
        .btn-active { background: #22d3ee !important; color: #0b0f1a !important; font-weight: bold; transform: scale(1.05); }
        .history-item { border-left: 4px solid; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-md mb-4 text-center">
        <h1 class="text-2xl font-black text-cyan-400 tracking-tighter italic">GOAL PREDICTOR PRO</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em]">Stratégie Bet261 Madagascar</p>
    </header>

    <main class="w-full max-w-md space-y-4">
        
        <div class="card p-4 rounded-2xl">
            <label class="text-[10px] font-bold text-slate-500 uppercase mb-3 block text-center italic">Sélection du Terrain</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTerrain(3, 1, this)" class="terrain-btn py-3 rounded-xl bg-slate-800 text-sm">Petite (3x4)</button>
                <button onclick="setTerrain(4, 1, this)" class="terrain-btn py-3 rounded-xl bg-slate-800 text-sm btn-active">Moyenne (4x7)</button>
                <button onclick="setTerrain(5, 1, this)" class="terrain-btn py-3 rounded-xl bg-slate-800 text-sm">Grande (5x10)</button>
            </div>
        </div>

        <div class="card p-4 rounded-2xl flex justify-between items-center">
            <div>
                <span class="text-[10px] font-bold text-slate-500 uppercase block">Paliers à franchir</span>
                <span id="paliersVal" class="text-3xl font-black text-cyan-400">3</span>
            </div>
            <div class="flex gap-3">
                <button onclick="changePalier(-1)" class="w-12 h-12 bg-slate-700 rounded-2xl text-2xl font-bold hover:bg-slate-600 transition">-</button>
                <button onclick="changePalier(1)" class="w-12 h-12 bg-cyan-600 rounded-2xl text-2xl font-bold hover:bg-cyan-500 transition">+</button>
            </div>
        </div>

        <div class="card p-4 rounded-2xl">
            <div class="flex justify-between items-center mb-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase italic">Ton Solde Actuel (Ar)</label>
                <span class="text-[9px] bg-red-900/30 text-red-400 px-2 py-1 rounded">Min: 400 Ar</span>
            </div>
            <input type="number" id="solde" value="11000" oninput="calculer()" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none text-white font-mono text-xl">
        </div>

        <div id="resultCard" class="p-6 rounded-3xl text-center border-2 transition-all duration-300">
            <div class="text-[10px] uppercase tracking-widest text-white/60 mb-1">Chances de Succès Statistique</div>
            <div id="percentage" class="text-6xl font-black mb-2">42.2%</div>
            <div class="h-[1px] w-full bg-white/10 my-4"></div>
            <div class="flex justify-between items-center px-4">
                <span class="text-sm text-slate-300">Mise suggérée :</span>
                <span id="miseSuggeree" class="text-xl font-black text-white">400 Ar</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="addHistory(true)" class="bg-green-600 hover:bg-green-500 p-3 rounded-xl font-bold uppercase text-xs">J'ai Gagné ✅</button>
            <button onclick="addHistory(false)" class="bg-red-600 hover:bg-red-500 p-3 rounded-xl font-bold uppercase text-xs">J'ai Perdu ❌</button>
        </div>

        <div class="card p-4 rounded-2xl max-h-40 overflow-y-auto">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-3 italic">Historique de la session</h3>
            <div id="historyList" class="space-y-2 text-xs">
                <p class="text-slate-600 text-center py-2">Aucun pari enregistré</p>
            </div>
        </div>

    </main>

    <script>
        let currentN = 4;
        let currentM = 1;
        let currentP = 3;

        function setTerrain(n, m, btn) {
            currentN = n; currentM = m;
            document.querySelectorAll('.terrain-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            calculer();
        }

        function changePalier(val) {
            currentP = Math.max(1, currentP + val);
            document.getElementById('paliersVal').innerText = currentP;
            calculer();
        }

        function calculer() {
            const probaUnitaire = (currentN - currentM) / currentN;
            const probaTotale = Math.pow(probaUnitaire, currentP) * 100;
            
            const pEl = document.getElementById('percentage');
            const rCard = document.getElementById('resultCard');
            const solde = parseFloat(document.getElementById('solde').value) || 0;
            
            pEl.innerText = probaTotale.toFixed(1) + "%";
            
            let miseBase = 0;
            if (probaTotale > 70) {
                miseBase = solde * 0.10;
                rCard.className = "p-6 rounded-3xl text-center border-2 border-green-500 bg-green-900/20 shadow-[0_0_15px_rgba(34,197,94,0.2)]";
            } else if (probaTotale > 40) {
                miseBase = solde * 0.05;
                rCard.className = "p-6 rounded-3xl text-center border-2 border-yellow-500 bg-yellow-900/20 shadow-[0_0_15px_rgba(234,179,8,0.1)]";
            } else {
                miseBase = solde * 0.02;
                rCard.className = "p-6 rounded-3xl text-center border-2 border-red-500 bg-red-900/20";
            }
            
            // Respect de la mise minimale de 400 Ar
            let miseFinale = Math.max(400, Math.floor(miseBase));
            if (solde < 400) miseFinale = 0;

            document.getElementById('miseSuggeree').innerText = miseFinale + " Ar";
        }

        function addHistory(win) {
            const list = document.getElementById('historyList');
            if (list.innerHTML.includes("Aucun pari")) list.innerHTML = "";
            
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const mise = document.getElementById('miseSuggeree').innerText;
            const item = document.createElement('div');
            item.className = `p-2 rounded bg-slate-800/50 history-item ${win ? 'border-green-500' : 'border-red-500'} flex justify-between items-center`;
            item.innerHTML = `<span>${win ? 'Gain' : 'Perte'} (${mise})</span> <span class="text-[9px] text-slate-500">${time}</span>`;
            
            list.prepend(item);
        }

        window.onload = calculer;
    </script>
</body>
</html>
