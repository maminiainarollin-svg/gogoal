<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Go Goal Analyzer Pro - Séquentiel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --border: #2a2a3a;
      --accent: #00e5a0; --accent2: #ff4d6d; --text: #e8e8f0;
      --muted: #666680; --card: #13131e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; padding: 15px; }
    .container { max-width: 600px; margin: 0 auto; }
    header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    
    /* Grille séquentielle */
    .grid-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 20px; overflow-x: auto; }
    #game-grid { display: grid; gap: 8px; }
    .cell { 
      aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border); 
      display: flex; align-items: center; justify-content: center; 
      background: var(--bg2); position: relative; cursor: pointer; font-size: 18px;
    }
    .cell.ball { border-color: var(--accent); background: rgba(0,229,160,0.1); }
    .cell.mine { border-color: var(--accent2); background: rgba(255,77,109,0.1); }
    .prob-tag { position: absolute; top: 2px; right: 2px; font-size: 8px; font-weight: bold; color: var(--accent); }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-main { background: var(--accent); color: #000; grid-column: 1 / -1; }
    .btn-sec { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
    
    .status-bar { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1 style="font-family: 'Syne';">GO GOAL <span>PRO</span></h1>
    <p style="font-size: 10px; color: var(--accent);">ANALYSE GAUCHE ➔ DROITE ACTIVÉE</p>
  </header>

  <div class="status-bar">
    <span id="data-count">Données : 0 parties</span>
    <span id="grid-current">Grille : 4x7</span>
  </div>

  <div class="grid-wrapper">
    <div id="game-grid"></div>
  </div>

  <div class="actions">
    <button class="btn btn-main" onclick="saveGame()">ENREGISTRER LA SÉQUENCE</button>
    <button class="btn btn-sec" onclick="resetGrid()">ANNULER</button>
    <button class="btn btn-sec" onclick="analyzeNext()">MEILLEUR CHEMIN</button>
  </div>
</div>

<script>
let rows = 4, cols = 7;
let cellStates = [];
let history = [];

// 1. MIGRATION ET RÉCUPÉRATION DES DONNÉES
function loadData() {
  const oldHistory = JSON.parse(localStorage.getItem('gogoal_history') || '[]');
  const v2History = JSON.parse(localStorage.getItem('gogoal_v2_history') || '[]');
  
  // Fusionner les anciennes données pour ne rien perdre
  history = [...v2History, ...oldHistory];
  document.getElementById('data-count').textContent = `Données : ${history.length} parties`;
}

function init() {
  loadData();
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('game-grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';
  cellStates = new Array(rows * cols).fill(0);

  const probs = calculateProbs();

  for (let i = 0; i < rows * cols; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${i}`;
    
    // Affichage des probabilités historiques sur les cases vides
    const p = probs[i] || 0;
    if (p > 0) {
      cell.innerHTML = `<span class="prob-tag">${Math.round(p * 100)}%</span>`;
      cell.style.backgroundColor = `rgba(0, 229, 160, ${Math.min(0.4, p)})`;
    }

    cell.onclick = () => {
      cellStates[i] = (cellStates[i] + 1) % 3;
      cell.className = 'cell' + (cellStates[i] === 1 ? ' ball' : cellStates[i] === 2 ? ' mine' : '');
      cell.textContent = cellStates[i] === 1 ? '⚽' : cellStates[i] === 2 ? '💣' : '';
    };
    grid.appendChild(cell);
  }
}

function calculateProbs() {
  const filtered = history.filter(h => h.grid === `${rows}x${cols}`);
  const counts = new Array(rows * cols).fill(0);
  if (filtered.length === 0) return counts;

  filtered.forEach((game, idx) => {
    const weight = Math.pow(0.92, idx); // Poids temporel pour les 16 parties
    const data = game.cells || game.data; // Support des deux formats (v1 et v2)
    data.forEach((val, i) => { if(val === 1) counts[i] += weight; });
  });

  const totalWeight = filtered.reduce((acc, _, idx) => acc + Math.pow(0.92, idx), 0);
  return counts.map(c => c / totalWeight);
}

function saveGame() {
  history.unshift({ grid: `${rows}x${cols}`, data: [...cellStates], date: Date.now() });
  localStorage.setItem('gogoal_v2_history', JSON.stringify(history));
  document.getElementById('data-count').textContent = `Données : ${history.length} parties`;
  resetGrid();
}

function resetGrid() {
  buildGrid();
}

function analyzeNext() {
  const probs = calculateProbs();
  let suggestion = "Chemin conseillé :\n";
  
  for (let c = 0; c < cols; c++) {
    let bestR = 0, max = -1;
    for (let r = 0; r < rows; r++) {
      const idx = r * cols + c;
      if (probs[idx] > max) { max = probs[idx]; bestR = r + 1; }
    }
    suggestion += `Col ${c+1} ➔ Ligne ${bestR} (${Math.round(max*100)}%)\n`;
  }
  alert(suggestion);
}

init();
</script>
</body>
</html>
